<title>季節の遊び・体験リスト</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Hiragino Sans','Noto Sans JP',sans-serif;background:#f7f5f2;min-height:100vh}
button{cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent}
input{font-family:inherit}
header{background:#fff;border-bottom:1px solid #e8e4de;position:sticky;top:0;z-index:50}
.header-inner{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 14px}
.title{font-size:13px;font-weight:600;color:#2d2926;letter-spacing:.03em;white-space:nowrap}
.filter-wrap{display:flex;gap:2px;background:#f3f1ee;border-radius:20px;padding:2px 3px;flex-shrink:0}
.filter-btn{padding:4px 10px;border-radius:14px;font-size:11px;font-weight:500;color:#7a7269;background:transparent;border:none}
.filter-btn.on{background:#fff;color:#2d2926;box-shadow:0 1px 3px rgba(0,0,0,.09)}
.tabs-row{display:flex;overflow-x:auto;padding:0 6px;border-top:1px solid #f0ede8;scrollbar-width:none}
.tabs-row::-webkit-scrollbar{display:none}
.tab{display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 14px;background:transparent;border:none;border-bottom:2.5px solid transparent;flex-shrink:0}
main{max-width:680px;margin:0 auto;padding:10px 12px 64px}
.s-head{border-radius:12px 12px 0 0;padding:12px 14px 10px;border:1px solid;border-bottom:none}
.s-head-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.s-name{font-size:18px;font-weight:600;flex:1;letter-spacing:.04em}
.s-count{font-size:12px;font-weight:500}
.edit-toggle{font-size:11px;font-weight:600;padding:4px 10px;border-radius:12px;border:1px solid;flex-shrink:0;transition:all .15s}
.bar-bg{height:3px;background:rgba(0,0,0,.07);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width .4s ease}
.cat-box{border:1px solid;border-top:none;border-radius:0 0 12px 12px;background:#fff;overflow:hidden}
.cat-block{padding:10px 12px 9px}
.cat-block+.cat-block{border-top:1px solid}
.cat-head{display:flex;align-items:center;gap:5px;margin-bottom:6px}
.cat-name{font-size:11px;font-weight:600;letter-spacing:.05em;flex:1}
.cat-cnt{font-size:10px;font-weight:500;opacity:.85}
.list{display:flex;flex-direction:column;gap:4px}

/* 通常カード */
.card{display:flex;align-items:center;gap:8px;padding:9px 11px;border-radius:9px;border:1px solid #eae7e2;background:#fff;width:100%;min-height:44px;text-align:left;transition:background .12s,border-color .12s}
.card.done{background:#faf9f7}
.card-body{display:flex;align-items:center;gap:8px;flex:1;min-width:0;cursor:pointer}
.card-txt{font-size:14px;font-weight:400;flex:1;line-height:1.4;color:#2d2926;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-txt.done{color:#bbb6af;text-decoration:line-through;text-decoration-color:#ccc8c0}
.check{font-size:13px;font-weight:700;flex-shrink:0;visibility:hidden}
.check.done{visibility:visible}
.link-btn{font-size:15px;background:transparent;border:none;padding:3px 4px;border-radius:6px;flex-shrink:0;line-height:1;opacity:0.6;text-decoration:none}
.link-btn:hover{opacity:1}

/* 編集カード */
.edit-card{display:flex;flex-direction:column;gap:5px;padding:9px 11px;border-radius:9px;border:1px solid #eae7e2;background:#fff;width:100%}
.edit-row1{display:flex;align-items:center;gap:6px}
.edit-row2{display:flex;align-items:center;gap:6px;padding-left:2px}
.inline-input{flex:1;font-size:14px;border:none;outline:none;background:transparent;color:#2d2926;padding:0;min-width:0}
.url-input{flex:1;font-size:12px;border:1px solid #e0ddd8;outline:none;background:#fafafa;color:#555;padding:5px 8px;border-radius:7px;min-width:0}
.url-input:focus{border-color:#aaa}
.url-label{font-size:11px;color:#aaa;flex-shrink:0;white-space:nowrap}
.del-btn{font-size:14px;background:transparent;border:none;padding:2px 4px;border-radius:6px;color:#e05555;flex-shrink:0}
.clear-url-btn{font-size:11px;background:transparent;border:none;color:#bbb;padding:2px 4px;flex-shrink:0;white-space:nowrap}
.clear-url-btn:hover{color:#e05555}

.add-row{margin-top:6px}
.add-form{display:flex;gap:6px}
.emoji-btn{font-size:18px;width:40px;height:40px;border-radius:9px;border:1px dashed;background:transparent;flex-shrink:0}
.add-input{flex:1;font-size:13px;padding:8px 10px;border-radius:9px;border:1px dashed #ddd;background:#fafafa;color:#555;outline:none}
.add-btn{font-size:12px;font-weight:600;color:#fff;padding:8px 12px;border-radius:9px;border:none;flex-shrink:0}
.picker{margin-top:6px;padding:10px 8px;background:#fff;border:1px solid;border-radius:10px;display:flex;flex-wrap:wrap;gap:4px}
.picker-btn{font-size:20px;width:36px;height:36px;border-radius:7px;border:1px solid transparent;background:transparent}
</style>
<style>
.dl-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e8e4de;padding:10px 16px;display:flex;align-items:center;justify-content:center;z-index:100}
.dl-btn{display:flex;align-items:center;gap:6px;background:#2d2926;color:#fff;border:none;border-radius:12px;padding:10px 22px;font-size:13px;font-weight:600;letter-spacing:.03em}
.dl-btn:active{opacity:.8}
</style>
</head>

      {id:"wi-o9",label:"雪の結晶切り紙",emoji:"❄️"},{id:"wi-o10",label:"鬼のお面づくり",emoji:"👹"},
    ]},
  ]},
  {id:"year",name:"通年",emoji:"🌈",accent:"#7c5cbf",light:"#f5f2fc",border:"#d4c8f0",tag:"#4c1d95",categories:[
    {id:"outside",name:"外でやる",icon:"🌳",items:[
      {id:"yr-o1",label:"公園ビンゴ",emoji:"🎯"},{id:"yr-o2",label:"雲の形さがし",emoji:"☁️"},
      {id:"yr-o3",label:"月を見る",emoji:"🌕"},{id:"yr-o4",label:"鳥の声を聞く",emoji:"🐦"},
      {id:"yr-o5",label:"電車・バスを見る",emoji:"🚃"},
    ]},
    {id:"inside",name:"家でやる",icon:"🏠",items:[
      {id:"yr-i1",label:"段ボールハウス",emoji:"📦"},{id:"yr-i2",label:"テープの道あそび",emoji:"🛤️"},
      {id:"yr-i3",label:"シール貼り",emoji:"⭐"},{id:"yr-i4",label:"粘土",emoji:"🟤"},
      {id:"yr-i5",label:"ブロックで街づくり",emoji:"🏙️"},
    ]},
    {id:"life",name:"生活・お手伝い",icon:"🧹",items:[
      {id:"yr-l1",label:"テーブルふき",emoji:"🧽"},{id:"yr-l2",label:"洗濯もの仕分け",emoji:"👕"},
      {id:"yr-l3",label:"靴を並べる",emoji:"👟"},{id:"yr-l4",label:"植物に水やり",emoji:"🌱"},
      {id:"yr-l5",label:"買い物ミッション",emoji:"🛒"},
    ]},
    {id:"book",name:"絵本・歌・ことば",icon:"📖",items:[
      {id:"yr-b1",label:"図書館に行く",emoji:"📚"},{id:"yr-b2",label:"手遊び歌",emoji:"🎵"},
      {id:"yr-b3",label:"しりとり",emoji:"💬"},{id:"yr-b4",label:"まねっこ遊び",emoji:"🙈"},
      {id:"yr-b5",label:"絵本の読み返し",emoji:"📖"},
    ]},
    {id:"experiment",name:"つくる・実験",icon:"🔬",items:[
      {id:"yr-e1",label:"色まぜ",emoji:"🎨"},{id:"yr-e2",label:"浮く・沈む",emoji:"🧪"},
      {id:"yr-e3",label:"磁石あそび",emoji:"🧲"},{id:"yr-e4",label:"光と影",emoji:"💡"},
      {id:"yr-e5",label:"ボール転がし実験",emoji:"⚽"},
    ]},
  ]},
];

const EMOJIS=["🌸","🌼","🌻","🌺","🌹","🌷","🌿","🍀","🌱","🌾","🍁","🍂","🍃","🍓","🍎","🍊","🍋","🍇","🍉","🍑","🍒","🥝","🥦","🥬","🌽","🥕","🐶","🐱","🐰","🐻","🐼","🐨","🦊","🐸","🦋","🐛","🐝","🐞","🦗","🐟","🐠","🐚","🦀","🦑","🐙","🐬","🌊","⭐","🌙","☀️","❄️","🌈","🎋","🎏","🎆","🎇","🎄","🎍","🎎","🏮","🎵","🎶","📖","📚","🖌️","🧺","🧹","🍡","🍧","🍚","🍲","🍊","🏃","🥾","🏊","💦","🔍","✨"];

let seasons,done,links,activeSeason,filter,editMode;

function load(){
  try{seasons=JSON.parse(localStorage.getItem(DATA_KEY))||INITIAL;}catch{seasons=INITIAL;}
  try{done=JSON.parse(localStorage.getItem(DONE_KEY))||{};}catch{done={};}
  try{links=JSON.parse(localStorage.getItem("seasonal-links-v1"))||{};}catch{links={};}
  activeSeason="spring";filter="all";editMode=false;
}
function save(){
  localStorage.setItem(DATA_KEY,JSON.stringify(seasons));
  localStorage.setItem(DONE_KEY,JSON.stringify(done));
  localStorage.setItem("seasonal-links-v1",JSON.stringify(links));
}
function genId(){return Math.random().toString(36).slice(2,9);}
function getTotals(s){const all=s.categories.flatMap(c=>c.items);return{total:all.length,doneCount:all.filter(i=>done[i.id]).length};}
function filterItems(items){
  if(editMode)return items;
  if(filter==="done")return items.filter(i=>done[i.id]);
  if(filter==="undone")return items.filter(i=>!done[i.id]);
  return items;
}
function normalizeUrl(u){
  u=u.trim();
  if(u&&!u.match(/^https?:\/\//))u="https://"+u;
  return u;
}

function render(){renderFilters();renderTabs();renderMain();}

function renderFilters(){
  const fw=document.getElementById("filterWrap");fw.innerHTML="";
  [["all","すべて"],["undone","未達成"],["done","達成済み"]].forEach(([v,l])=>{
    const b=document.createElement("button");
    b.className="filter-btn"+(filter===v&&!editMode?" on":"");
    b.textContent=l;b.onclick=()=>{filter=v;editMode=false;render();};
    fw.appendChild(b);
  });
}

function renderTabs(){
  const tr=document.getElementById("tabsRow");tr.innerHTML="";
  seasons.forEach(s=>{
    const{total,doneCount}=getTotals(s);const active=activeSeason===s.id;
    const b=document.createElement("button");b.className="tab";
    b.style.borderBottomColor=active?s.accent:"transparent";
    b.innerHTML=`<span style="font-size:18px">${s.emoji}</span>
      <span style="font-size:13px;font-weight:${active?600:400};color:${active?s.tag:'#999'}">${s.name}</span>
      <span style="font-size:10px;color:${active?s.accent:'#ccc'}">${doneCount}/${total}</span>`;
    b.onclick=()=>{activeSeason=s.id;editMode=false;render();};
    tr.appendChild(b);
  });
}

function renderMain(){
  const main=document.getElementById("main");main.innerHTML="";
  const s=seasons.find(s=>s.id===activeSeason);
  const{total,doneCount}=getTotals(s);const pct=total?Math.round(doneCount/total*100):0;

  const sh=document.createElement("div");sh.className="s-head";
  sh.style.cssText=`background:${s.light};border-color:${s.border}`;
  sh.innerHTML=`<div class="s-head-top">
    <span style="font-size:20px">${s.emoji}</span>
    <span class="s-name" style="color:${s.tag}">${s.name}</span>
    <span class="s-count" style="color:${s.accent}">${doneCount} / ${total}</span>
    <button class="edit-toggle" id="editToggle"
      style="background:${editMode?s.accent:'transparent'};border-color:${editMode?s.accent:s.border};color:${editMode?'#fff':s.tag}">
      ${editMode?"✅ 完了":"✏️ 編集"}
    </button></div>
    <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${s.accent}"></div></div>`;
  sh.querySelector("#editToggle").onclick=()=>{editMode=!editMode;render();};
  main.appendChild(sh);

  const cb=document.createElement("div");cb.className="cat-box";cb.style.borderColor=s.border;

  s.categories.forEach(cat=>{
    const catDone=cat.items.filter(i=>done[i.id]).length;
    const visible=filterItems(cat.items);
    const cd=document.createElement("div");cd.className="cat-block";cd.style.borderColor=s.border;
    cd.innerHTML=`<div class="cat-head">
      <span style="font-size:12px">${cat.icon}</span>
      <span class="cat-name" style="color:${s.tag}">${cat.name}</span>
      <span class="cat-cnt" style="color:${s.accent}">${catDone}/${cat.items.length}</span></div>`;

    const list=document.createElement("div");list.className="list";

    visible.forEach(item=>{
      const isDone=!!done[item.id];
      const itemLink=links[item.id]||"";

      if(editMode){
        // 編集カード
        const card=document.createElement("div");card.className="edit-card";
        // 行1: 絵文字 + ラベル + 削除
        const row1=document.createElement("div");row1.className="edit-row1";
        row1.innerHTML=`<span style="font-size:16px;flex-shrink:0">${item.emoji}</span>
          <input class="inline-input" value="${item.label.replace(/"/g,'&quot;')}" placeholder="項目名">
          <button class="del-btn">✕</button>`;
        const inp=row1.querySelector("input");
        inp.onblur=()=>{if(inp.value.trim()){item.label=inp.value.trim();save();}};
        inp.onkeydown=e=>{if(e.key==="Enter")inp.blur();};
        row1.querySelector(".del-btn").onclick=()=>{cat.items=cat.items.filter(i=>i.id!==item.id);save();render();};

        // 行2: URLラベル + URL入力 + クリア
        const row2=document.createElement("div");row2.className="edit-row2";
        row2.innerHTML=`<span class="url-label">🔗</span>
          <input class="url-input" placeholder="https://..." value="${itemLink.replace(/"/g,'&quot;')}">
          ${itemLink?`<button class="clear-url-btn">消す</button>`:""}`;
        const urlInp=row2.querySelector(".url-input");
        urlInp.onblur=()=>{
          const v=normalizeUrl(urlInp.value);
          if(v){links[item.id]=v;}else{delete links[item.id];}
          save();render();
        };
        urlInp.onkeydown=e=>{if(e.key==="Enter")urlInp.blur();};
        const clrBtn=row2.querySelector(".clear-url-btn");
        if(clrBtn)clrBtn.onclick=()=>{delete links[item.id];save();render();};

        card.appendChild(row1);card.appendChild(row2);
        list.appendChild(card);

      }else{
        // 通常カード
        const card=document.createElement("div");card.className="card"+(isDone?" done":"");
        if(isDone)card.style.borderColor=s.border;

        // タップでチェック切り替えエリア
        const body=document.createElement("div");body.className="card-body";
        body.innerHTML=`<span style="font-size:16px;flex-shrink:0">${item.emoji}</span>
          <span class="card-txt${isDone?' done':''}">${item.label}</span>
          <span class="check${isDone?' done':''}" style="color:${s.accent}">✓</span>`;
        body.onclick=()=>{done[item.id]=!done[item.id];save();render();};
        card.appendChild(body);

        // リンクボタン（URLがある場合のみ）
        if(itemLink){
          const a=document.createElement("a");a.className="link-btn";
          a.href=itemLink;a.target="_blank";a.rel="noopener noreferrer";
          a.textContent="🔗";a.title=itemLink;
          card.appendChild(a);
        }

        list.appendChild(card);
      }
    });

    cd.appendChild(list);

    // 編集モード：追加行
    if(editMode){
      const ar=document.createElement("div");ar.className="add-row";
      const rowId=cat.id+"-"+s.id;let selEmoji="⭐";let pickerOpen=false;
      ar.innerHTML=`<div class="add-form">
        <button class="emoji-btn" id="eb-${rowId}" style="border-color:${s.border}">${selEmoji}</button>
        <input class="add-input" id="ai-${rowId}" placeholder="＋ 項目を追加..." style="border-color:${s.border}">
        <button class="add-btn" id="ab-${rowId}" style="background:${s.accent}">追加</button></div>
        <div class="picker" id="pk-${rowId}" style="display:none;border-color:${s.border}">
        ${EMOJIS.map(e=>`<button class="picker-btn" data-e="${e}">${e}</button>`).join("")}</div>`;
      const eb=ar.querySelector(`#eb-${rowId}`),ai=ar.querySelector(`#ai-${rowId}`);
      const ab=ar.querySelector(`#ab-${rowId}`),pk=ar.querySelector(`#pk-${rowId}`);
      eb.onclick=()=>{pickerOpen=!pickerOpen;pk.style.display=pickerOpen?"flex":"none";eb.style.borderColor=pickerOpen?s.accent:s.border;};
      pk.querySelectorAll(".picker-btn").forEach(btn=>{
        btn.onclick=()=>{selEmoji=btn.dataset.e;eb.textContent=selEmoji;pickerOpen=false;pk.style.display="none";};
      });
      const doAdd=()=>{if(ai.value.trim()){cat.items.push({id:genId(),label:ai.value.trim(),emoji:selEmoji});save();render();}};
      ab.onclick=doAdd;ai.onkeydown=e=>{if(e.key==="Enter")doAdd();};
      cd.appendChild(ar);
    }

    cb.appendChild(cd);
  });
  main.appendChild(cb);
}

load();render();

function downloadHTML(){
  const src=document.documentElement.outerHTML
    .replace('<div class="dl-bar">','<div class="dl-bar" style="display:none">');
  const blob=new Blob([src],{type:"text/html;charset=utf-8"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="index.html";
  a.click();
  URL.revokeObjectURL(a.href);
}
</script>
</body>
</html>
